<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MenuSwipe</title>
<meta name="theme-color" content="#8E1616"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#1D1616;color:#EEEEEE;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.logo-icon{width:80px;height:80px;border-radius:20px;background:#8E1616;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.logo-text{font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.logo-text span{color:#D84040}
.tagline{font-size:15px;color:rgba(238,238,238,.5);margin-bottom:48px;text-align:center}
.btn{display:block;width:100%;max-width:320px;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;margin-bottom:12px}
.btn-primary{background:#8E1616;color:#fff}
.btn-primary:hover{background:#7a1313}
</style>
</head>
<body>
<div class="logo-icon">
  <svg width="50" height="50" viewBox="0 0 80 80" fill="none">
    <path d="M16 64 L16 16 L40 48 L64 16 L64 64" stroke="#fff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>
</div>
<div class="logo-text">Menu<span>Swipe</span></div>
<div class="tagline">Visual menus for modern restaurants</div>
<a href="/admin" class="btn btn-primary">Open Admin Panel</a>
<script>
if(localStorage.getItem('ms_token')) window.location.href='/admin';
</script>
</body>
</html>
