<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>MenuSwipe</title>
<meta name="theme-color" content="#000000"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000;font-family:system-ui,-apple-system,sans-serif}

/* SPLASH */
#splash{position:fixed;inset:0;background:#1D1616;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:100;transition:opacity .5s}
#splash.hide{opacity:0;pointer-events:none}
.splash-logo{width:96px;height:96px;border-radius:24px;background:#8E1616;display:flex;align-items:center;justify-content:center;overflow:hidden}
.splash-logo img{width:100%;height:100%;object-fit:cover;display:block}
.splash-name{font-size:24px;font-weight:800;color:#fff}
.splash-tag{font-size:13px;color:rgba(255,255,255,.4)}

/* MAIN */
#screen{width:100%;height:100%;position:relative;overflow:hidden}

/* TOP BAR */
.top-bar{
  position:absolute;top:0;left:0;right:0;z-index:20;
  padding-top:max(env(safe-area-inset-top,0px), 24px);
  padding-left:14px;padding-right:14px;padding-bottom:12px;
  background:linear-gradient(to bottom,rgba(0,0,0,.75) 0%,rgba(0,0,0,.4) 70%,transparent 100%);
  display:flex;align-items:center;gap:10px;
}
.profile-btn{
  width:46px;height:46px;border-radius:50%;
  background:rgba(255,255,255,.15);
  border:2px solid rgba(255,255,255,.4);
  overflow:hidden;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  padding:0;
}
.profile-btn img{
  width:100%;height:100%;object-fit:cover;display:block;
}
.profile-btn-fallback{
  width:100%;height:100%;background:#8E1616;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;color:#fff;
}
.cats{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;flex:1;-webkit-overflow-scrolling:touch}
.cats::-webkit-scrollbar{display:none}
.cat{padding:9px 18px;border-radius:22px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;border:1.5px solid rgba(255,255,255,.25);color:rgba(255,255,255,.8);background:rgba(255,255,255,.12);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.cat.on{background:#fff;color:#111;border-color:#fff}

/* SLIDES */
.slides-wrap{position:absolute;inset:0;overflow:hidden}
.slide{position:absolute;inset:0;transition:transform .42s cubic-bezier(.25,.46,.45,.94)}
.photos-track{position:absolute;inset:0;display:flex;transition:transform .3s cubic-bezier(.25,.46,.45,.94)}
.photo-frame{flex:0 0 100%;height:100%;position:relative}
.photo-frame img{width:100%;height:100%;object-fit:cover;display:block}
.photo-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center}

.grad{position:absolute;bottom:0;left:0;right:0;height:65%;background:linear-gradient(to top,rgba(0,0,0,.96),rgba(0,0,0,0));pointer-events:none}

/* TAGS — info bölgesinde, kategori üstünde */
.tags-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.tag-pill{
  display:inline-flex;align-items:center;
  padding:4px 10px;border-radius:20px;
  font-size:11px;font-weight:800;letter-spacing:.4px;
  color:#fff;
}
/* Marketing */
.tag-NEW{background:#3B82F6}
.tag-BESTSELLER{background:#F59E0B}
.tag-OFFER{background:#8B5CF6}
.tag-LIMITED{background:#F43F5E}
.tag-SEASONAL{background:#D97706}
.tag-LOCAL_FOOD{background:#047857}
.tag-SOLD_OUT{background:#374151}
/* Dietary */
.tag-SPICY{background:#EF4444}
.tag-VEGAN{background:#22C55E}
.tag-GLUTEN_FREE{background:#06B6D4}
.tag-HALAL{background:#84CC16}
.tag-DAIRY_FREE{background:#64748B}
.tag-PROTEIN_PLUS{background:#EC4899}

/* FILTER BUTTON */
.filter-btn{
  width:46px;height:46px;border-radius:50%;
  background:rgba(255,255,255,.15);
  border:2px solid rgba(255,255,255,.4);
  cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  padding:0;color:#fff;
  position:relative;
}
.filter-btn.has-active{background:#8E1616;border-color:#8E1616}
.filter-badge{
  position:absolute;top:-2px;right:-2px;
  width:16px;height:16px;border-radius:50%;
  background:#fff;color:#8E1616;
  font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  border:2px solid #1D1616;
}

/* FILTER SHEET */
.filter-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:90;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.filter-overlay.open{display:flex}
.filter-sheet{background:#1D1616;border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;padding:20px 20px calc(24px + env(safe-area-inset-bottom,0px));color:#fff;position:relative}
.filter-title{font-size:18px;font-weight:800;color:#fff;text-align:center;margin-bottom:6px}
.filter-sub{font-size:12px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:18px}
.filter-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.filter-chip{
  padding:9px 16px;border-radius:24px;
  border:1.5px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.06);
  color:#fff;font-size:13px;font-weight:700;cursor:pointer;
}
.filter-chip.on{background:#fff;color:#1D1616;border-color:#fff}
.filter-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.filter-clear{padding:13px;border-radius:14px;border:1.5px solid rgba(255,255,255,.2);background:transparent;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.filter-apply{padding:13px;border-radius:14px;border:none;background:#8E1616;color:#fff;font-size:13px;font-weight:700;cursor:pointer}

/* LANG BUTTON */
.lang-btn{
  display:flex;align-items:center;gap:5px;
  height:46px;padding:0 14px;border-radius:23px;
  background:rgba(255,255,255,.15);
  border:2px solid rgba(255,255,255,.4);
  cursor:pointer;flex-shrink:0;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:#fff;font-size:13px;font-weight:800;letter-spacing:.5px;
}
.lang-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:90;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.lang-overlay.open{display:flex}
.lang-sheet{background:#1D1616;border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;padding:20px 20px calc(24px + env(safe-area-inset-bottom,0px));color:#fff;position:relative}
.lang-grid{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.lang-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:12px;
  background:rgba(255,255,255,.06);
  cursor:pointer;color:#fff;
}
.lang-row.on{background:#8E1616}
.lang-code{
  width:34px;height:34px;border-radius:8px;
  background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:#fff;flex-shrink:0;
}
.lang-row.on .lang-code{background:rgba(255,255,255,.25)}
.lang-name{flex:1;font-size:14px;font-weight:600}

/* DETAIL SHEET — item detayları (read more) */
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:95;align-items:flex-end;justify-content:center;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.detail-overlay.open{display:flex}
.detail-sheet{
  background:#1D1616;border-radius:24px 24px 0 0;
  width:100%;max-width:520px;max-height:92vh;
  overflow:hidden;color:#fff;
  display:flex;flex-direction:column;
}
.detail-photo{
  position:relative;width:100%;height:280px;
  background:#000;flex-shrink:0;
  overflow:hidden;
}
.detail-photo img{width:100%;height:100%;object-fit:cover}
.detail-photo-placeholder{
  width:100%;height:100%;display:flex;
  align-items:center;justify-content:center;
}
.detail-close{
  position:absolute;top:14px;right:14px;
  width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:none;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  z-index:5;
}
.detail-photo-dots{
  position:absolute;bottom:12px;left:50%;
  transform:translateX(-50%);
  display:flex;gap:5px;z-index:4;
}
.detail-photo-dots .dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.4);transition:.2s;
}
.detail-photo-dots .dot.on{background:#fff;width:18px;border-radius:3px}
.detail-body{
  flex:1;overflow-y:auto;padding:20px 22px 12px;
}
.detail-cat{
  font-size:11px;font-weight:700;letter-spacing:.6px;
  text-transform:uppercase;
  color:rgba(255,255,255,.5);
  margin-bottom:6px;
}
.detail-tags-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.detail-name{
  font-size:26px;font-weight:800;color:#fff;
  line-height:1.2;letter-spacing:-0.5px;
  margin-bottom:8px;
}
.detail-desc{
  font-size:14px;color:rgba(255,255,255,.75);
  line-height:1.55;margin-bottom:14px;
  white-space:pre-wrap;
}
.detail-price{
  font-size:24px;font-weight:800;color:#fff;
  margin-bottom:16px;
}
.detail-footer{
  padding:14px 16px calc(16px + env(safe-area-inset-bottom,0px));
  border-top:1px solid rgba(255,255,255,.08);
  flex-shrink:0;background:#1D1616;
}
.detail-add-btn{
  width:100%;padding:15px;border-radius:14px;
  border:none;background:#8E1616;color:#fff;
  font-size:14px;font-weight:800;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.detail-add-btn.in-list{
  background:transparent;border:1.5px solid rgba(255,255,255,.2);
}
.detail-qty-row{
  display:flex;align-items:center;gap:10px;
}
.detail-qty-controls{
  flex:1;display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.08);border-radius:14px;padding:6px 6px;
}
.detail-qty-controls button{
  width:48px;height:48px;border:none;background:rgba(255,255,255,.08);
  color:#fff;font-size:22px;font-weight:700;cursor:pointer;
  border-radius:11px;display:flex;align-items:center;justify-content:center;
  -webkit-user-select:none;user-select:none;
}
.detail-qty-controls .num{
  font-size:18px;font-weight:800;color:#fff;
  min-width:30px;text-align:center;
}

/* "Read more" link (slide içinde) */
.read-more-link{
  display:inline-block;color:rgba(255,255,255,.85);
  font-size:13px;font-weight:700;
  text-decoration:underline;text-underline-offset:2px;
  cursor:pointer;margin-top:2px;
}

/* ORDER LIST */
.add-btn{
  position:absolute;right:16px;top:max(calc(env(safe-area-inset-top,0px) + 80px), 100px);
  width:50px;height:50px;border-radius:50%;
  background:#8E1616;border:none;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(142,22,22,.5);
  transition:transform .15s, background .2s;
  z-index:6;
}
.add-btn:active{transform:scale(.92)}
.qty-controls{
  position:absolute;right:16px;top:max(calc(env(safe-area-inset-top,0px) + 80px), 100px);
  display:flex;align-items:center;
  background:#1a8754;border-radius:25px;
  box-shadow:0 6px 20px rgba(26,135,84,.5);
  z-index:6;height:50px;
}
.qty-btn{
  width:40px;height:50px;border:none;background:transparent;
  color:#fff;font-size:22px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
}
.qty-num{
  min-width:26px;color:#fff;font-size:17px;font-weight:800;
  text-align:center;
  -webkit-user-select:none;user-select:none;
}

/* CART BADGE on profile button */
.cart-badge{
  position:absolute;top:-3px;right:-3px;
  min-width:18px;height:18px;padding:0 5px;border-radius:9px;
  background:#fff;color:#8E1616;
  font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  border:2px solid #1D1616;
}

/* CART/ORDER LIST FAB */
.order-fab{
  position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(20px + env(safe-area-inset-bottom,0px));
  background:#fff;color:#1D1616;
  padding:12px 18px;border-radius:30px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 6px 24px rgba(0,0,0,.4);
  cursor:pointer;border:none;
  font-size:13px;font-weight:800;
  z-index:7;
  transition:opacity .25s, transform .25s;
}
.order-fab.hide{opacity:0;transform:translate(-50%, 20px);pointer-events:none}
.order-fab-count{
  background:#8E1616;color:#fff;
  min-width:22px;height:22px;border-radius:11px;
  font-size:11px;font-weight:800;
  display:flex;align-items:center;justify-content:center;padding:0 6px;
}

/* ORDER SHEET */
.order-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:95;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.order-overlay.open{display:flex}
.order-sheet{background:#1D1616;border-radius:24px 24px 0 0;width:100%;max-width:520px;max-height:88vh;overflow:hidden;color:#fff;display:flex;flex-direction:column}
.order-sheet-header{padding:18px 20px 12px;flex-shrink:0}
.order-sheet-body{flex:1;overflow-y:auto;padding:0 16px}
.order-sheet-footer{padding:14px 16px calc(16px + env(safe-area-inset-bottom,0px));border-top:1px solid rgba(255,255,255,.08);flex-shrink:0;background:#1D1616}

.order-row{display:flex;align-items:center;gap:10px;padding:11px 12px;background:rgba(255,255,255,.06);border-radius:14px;margin-bottom:8px}
.order-thumb{width:48px;height:48px;border-radius:10px;background:rgba(255,255,255,.05);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.order-thumb img{width:100%;height:100%;object-fit:cover}
.order-info{flex:1;min-width:0}
.order-name{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.order-orig{font-size:11px;color:rgba(255,255,255,.5);font-style:italic;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.order-price{font-size:11px;color:rgba(255,255,255,.7);margin-top:2px}
.order-qty{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border-radius:18px;padding:3px;flex-shrink:0}
.order-qty button{width:28px;height:28px;border:none;background:transparent;color:#fff;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%}
.order-qty button:hover{background:rgba(255,255,255,.1)}
.order-qty .num{min-width:18px;text-align:center;color:#fff;font-weight:800;font-size:13px}
.order-total-row{display:flex;align-items:center;justify-content:space-between;padding:10px 4px}
.order-total-label{font-size:13px;color:rgba(255,255,255,.6);font-weight:600}
.order-total-amt{font-size:22px;font-weight:800;color:#fff}
.order-allergen-row{display:flex;align-items:center;padding:4px 0;cursor:pointer;-webkit-user-select:none;user-select:none}
.order-allergen-detail{border-top:1px solid rgba(255,255,255,.06);margin-top:2px;padding-top:4px}

/* CROSS SELL */
.cross-sell-card{
  position:fixed;
  bottom:calc(80px + env(safe-area-inset-bottom,0px));
  left:16px;right:16px;
  background:#1D1616;
  border:1px solid rgba(255,255,255,.15);
  border-radius:18px;
  padding:12px 14px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  z-index:50;
  transform:translateX(110%);
  transition:transform .35s cubic-bezier(.25,.46,.45,.94);
  touch-action:pan-x;
}
.cross-sell-card.visible{transform:translateX(0)}
.cross-sell-thumb{
  width:52px;height:52px;border-radius:12px;
  background:rgba(255,255,255,.05);overflow:hidden;flex-shrink:0;
}
.cross-sell-thumb img{width:100%;height:100%;object-fit:cover}
.cross-sell-text{flex:1;min-width:0}
.cross-sell-label{font-size:10px;font-weight:700;color:#D84040;letter-spacing:.4px;text-transform:uppercase;margin-bottom:2px}
.cross-sell-name{font-size:14px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cross-sell-price{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px}
.cross-sell-add{
  width:36px;height:36px;border-radius:10px;
  background:#8E1616;border:none;color:#fff;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  font-size:20px;font-weight:300;
}

/* WAITER MODE */
.waiter-screen{position:fixed;inset:0;background:#000;z-index:200;color:#fff;display:none;flex-direction:column;padding:env(safe-area-inset-top,0px) 0 env(safe-area-inset-bottom,0px)}
.waiter-screen.open{display:flex}
.waiter-header{padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.1)}
.waiter-title{flex:1;font-size:16px;font-weight:800}
.waiter-close{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.1);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.waiter-list{flex:1;overflow-y:auto;padding:14px 16px}
.waiter-item{
  display:flex;align-items:center;gap:14px;
  padding:18px 14px 18px 18px;
  background:#1a1a1a;border-radius:16px;margin-bottom:10px;
}
.waiter-text{flex:1;min-width:0}
.waiter-name{font-size:22px;font-weight:800;color:#fff;line-height:1.2;letter-spacing:-0.3px}
.waiter-trans{font-size:13px;color:rgba(255,255,255,.45);font-style:italic;margin-top:4px;line-height:1.3}
.waiter-price{
  font-size:15px;font-weight:600;
  color:rgba(255,255,255,.7);
  margin-top:6px;
}
.waiter-qty-box{
  background:#8E1616;color:#fff;
  min-width:62px;height:62px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:800;
  flex-shrink:0;
  letter-spacing:-1px;
}
.waiter-qty-box .x{font-size:14px;font-weight:600;opacity:.7;margin-right:1px}
.waiter-total{
  border-top:2px solid rgba(255,255,255,.15);
  padding:18px 16px calc(20px + env(safe-area-inset-bottom,0px));
  display:flex;align-items:center;justify-content:space-between;
}
.waiter-total-label{font-size:14px;font-weight:600;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.5px}
.waiter-total-amt{font-size:32px;font-weight:800;color:#fff}

.info{position:absolute;bottom:0;left:0;right:0;padding:20px 20px calc(24px + env(safe-area-inset-bottom,0px));pointer-events:none}
.cat-tag{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:5px}
.item-name{font-size:26px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:5px}
.item-desc{font-size:13px;color:rgba(255,255,255,.6);line-height:1.5;margin-bottom:6px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.item-price{font-size:22px;font-weight:800;color:#fff;margin-bottom:10px}

.photo-dots{display:flex;gap:5px;margin-bottom:6px}
.pd{height:3px;border-radius:2px;background:rgba(255,255,255,.35);transition:.2s;width:18px}
.pd.on{background:#fff;width:28px}

.prog{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.1)}
.progf{height:100%;background:#8E1616;transition:width .35s}

/* RESTAURANT INFO SHEET */
.info-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:90;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.info-overlay.open{display:flex}
.info-sheet{background:#1D1616;border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:20px 20px calc(24px + env(safe-area-inset-bottom,0px));color:#fff;position:relative}
.info-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.2);margin:0 auto 18px}
.info-header{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:20px;text-align:center}
.info-logo{width:80px;height:80px;border-radius:20px;background:#8E1616;overflow:hidden;display:flex;align-items:center;justify-content:center}
.info-logo img{width:100%;height:100%;object-fit:cover;display:block}
.info-name{font-size:22px;font-weight:800;color:#fff}
.info-branch{font-size:13px;color:rgba(255,255,255,.5);margin-top:2px}
.info-address{font-size:13px;color:rgba(255,255,255,.7);text-align:center;line-height:1.5}

.action-btn-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.action-btn{padding:14px;border-radius:14px;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:13px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;text-decoration:none;text-align:center}
.action-btn-primary{background:#8E1616}

.section-title{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;margin-top:18px;margin-bottom:10px}
.contact-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,.06);border-radius:12px;margin-bottom:8px;text-decoration:none;color:inherit;cursor:pointer}
.contact-icon{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.contact-info{flex:1;min-width:0}
.contact-label{font-size:11px;color:rgba(255,255,255,.5);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.contact-value{font-size:14px;color:#fff;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}

.hours-list{background:rgba(255,255,255,.06);border-radius:12px;padding:6px 14px}
.hours-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:13px}
.hours-row:last-child{border-bottom:none}
.hours-day{color:rgba(255,255,255,.7);font-weight:600;min-width:50px}
.hours-day.today{color:#f59e0b}
.hours-time{color:rgba(255,255,255,.9)}
.hours-time.closed{color:rgba(255,255,255,.4)}

.branch-switch-list{margin-top:8px}
.branch-switch-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(255,255,255,.06);border-radius:12px;margin-bottom:6px;cursor:pointer;text-decoration:none;color:inherit}
.branch-switch-item.current{background:#8E1616}

.close-btn{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;z-index:5}

.error-screen{display:flex;align-items:center;justify-content:center;height:100%;color:rgba(255,255,255,.5);font-size:15px;background:#1D1616;text-align:center;padding:24px}
</style>

<body>

<div id="splash">
  <div class="splash-logo" id="splashLogo">
    <svg width="48" height="48" viewBox="0 0 80 80" fill="none"><path d="M16 64 L16 16 L40 48 L64 16 L64 64" stroke="#fff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
  </div>
  <div class="splash-name" id="splashName">MenuSwipe</div>
  <div class="splash-tag">Loading menu...</div>
</div>

<div id="screen">
  <div class="top-bar">
    <button class="profile-btn" id="profileBtn" onclick="openInfo()">
      <div class="profile-btn-fallback" id="profileFallback">M</div>
    </button>
    <button class="filter-btn" id="filterBtn" onclick="openFilter()">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M5 10h10M8 15h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <div class="filter-badge" id="filterBadge" style="display:none">0</div>
    </button>
    <button class="lang-btn" id="langBtn" onclick="openLangPicker()" style="display:none">
      <span id="langBtnLabel">EN</span>
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style="opacity:.7"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="cats" id="catBar"></div>
  </div>
  <div class="slides-wrap" id="slidesWrap"></div>
  <div class="prog"><div class="progf" id="progf"></div></div>
</div>

<!-- Language picker overlay -->
<div class="lang-overlay" id="langOverlay">
  <div class="lang-sheet">
    <div class="info-handle"></div>
    <div class="filter-title">Language</div>
    <div class="filter-sub">Choose your menu language</div>
    <div class="lang-grid" id="langGrid"></div>
  </div>
</div>

<!-- Cross-sell card -->
<div class="cross-sell-card" id="crossSellCard"></div>

<!-- Detail sheet (item detayları) -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-sheet" id="detailSheet">
    <div class="detail-photo" id="detailPhoto"></div>
    <div class="detail-body" id="detailBody"></div>
    <div class="detail-footer" id="detailFooter"></div>
  </div>
</div>

<!-- Order list FAB (görünür: liste boş değilse) -->
<button class="order-fab hide" id="orderFab" onclick="openOrderSheet()">
  <span id="orderFabCount" class="order-fab-count">0</span>
  <span id="orderFabLabel">View order</span>
  <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
</button>

<!-- Order sheet -->
<div class="order-overlay" id="orderOverlay">
  <div class="order-sheet">
    <div class="order-sheet-header">
      <div class="info-handle"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
        <div>
          <div style="font-size:18px;font-weight:800">My order</div>

          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
    <div class="order-sheet-body" id="orderItems"></div>
    <div class="order-sheet-footer">
      <div class="order-total-row">
        <span class="order-total-label">Total</span>
        <span class="order-total-amt" id="orderTotal">$0</span>
      </div>

        <button onclick="clearOrder()" style="padding:13px;border-radius:14px;border:1.5px solid rgba(255,255,255,.15);background:transparent;color:#fff;font-size:13px;font-weight:700;cursor:pointer">Clear</button>

          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="4" r="2.5" stroke="currentColor" stroke-width="1.6"/><path d="M2 13c0-3 2.5-5 5-5s5 2 5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          Show to waiter
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Waiter mode (full screen) -->
<div class="waiter-screen" id="waiterScreen">
  <div class="waiter-header">
    <div class="waiter-title">Order summary</div>
    <button class="waiter-close" onclick="closeWaiterMode()">

    </button>
  </div>

  <div class="waiter-total">

  </div>
</div>

<div class="filter-overlay" id="filterOverlay">
  <div class="filter-sheet">
    <div class="info-handle"></div>
    <div class="filter-title">Filter menu</div>

      🚫 Allergen-free — hide dishes containing:
    </div>
    <div class="filter-grid" id="allergenFilterGrid" style="margin-bottom:14px"></div>

    <!-- DİVIDER -->
    <div style="height:1px;background:rgba(255,255,255,.08);margin-bottom:14px"></div>

    <!-- DIETARY BÖLÜMÜ -->

      <button class="filter-apply" onclick="applyFilter()">Apply</button>
    </div>
  </div>
</div>

<div class="info-overlay" id="infoOverlay">

    <div class="info-handle"></div>
    <div id="infoContent"></div>

</div>

/* ORDER LIST PERSISTENCE */
function orderStorageKey(){ return 'ms_order_'+slug; }

function loadOrderList(){
  try{
    const raw = localStorage.getItem(orderStorageKey());
    if(!raw){ orderList = {}; return; }
    const data = JSON.parse(raw);
    // 24 saatten eski ise temizle
    if(data.savedAt && (Date.now() - data.savedAt) > 24*60*60*1000){
      orderList = {};
      localStorage.removeItem(orderStorageKey());
      return;
    }
    orderList = data.items || {};
  }catch(e){ orderList = {}; }
}

function saveOrderList(){
  try{
    localStorage.setItem(orderStorageKey(), JSON.stringify({
      items: orderList,
      savedAt: Date.now(),
    }));
  }catch(e){}
}

let _lastAddTime = 0;
let _lastAddItemId = null;
function addToOrder(itemId){
  // Debounce: aynı item'a 400ms içinde tekrar tıklanırsa yok say
  const now = Date.now();
  if(_lastAddItemId === itemId && (now - _lastAddTime) < 400) return;
  _lastAddTime = now;
  _lastAddItemId = itemId;
  
  const item = allItems.find(i => i.id === itemId);
  if(!item) return;
  if(!orderList[itemId]){
    orderList[itemId] = {
      qty: 1,
      name: item.name,
      originalName: item.originalName||item.name,
      price: item.price,
      photoUrl: item.photos?.[0]?.url||null,
      allergens: item.allergens||[],
      category: item.category||'MAIN',
    };
    triggerCrossSell(item);
  } else {
    orderList[itemId].qty++;
  }
  saveOrderList();
  renderAddBox(item);
  updateOrderFab();
}

let _lastQtyTime = 0;
function incQty(itemId){
  const now = Date.now();
  if((now - _lastQtyTime) < 250) return;
  _lastQtyTime = now;
  const item = allItems.find(i => i.id === itemId);
  if(!item || !orderList[itemId]) return;
  orderList[itemId].qty++;
  saveOrderList();
  renderAddBox(item);
  updateOrderFab();
  if(document.getElementById('orderOverlay').classList.contains('open')) renderOrderSheet();
}

function decQty(itemId){
  const now = Date.now();
  if((now - _lastQtyTime) < 250) return;
  _lastQtyTime = now;
  const item = allItems.find(i => i.id === itemId);
  if(!item || !orderList[itemId]) return;
  orderList[itemId].qty--;
  if(orderList[itemId].qty <= 0) delete orderList[itemId];
  saveOrderList();
  renderAddBox(item);
  updateOrderFab();
  if(document.getElementById('orderOverlay').classList.contains('open')) renderOrderSheet();
}

function updateOrderFab(){
  const fab = document.getElementById('orderFab');
  const totalQty = Object.values(orderList).reduce((s,i)=>s+i.qty, 0);
  if(totalQty > 0){
    fab.classList.remove('hide');
    document.getElementById('orderFabCount').textContent = totalQty;
  } else {
    fab.classList.add('hide');
  }
}

// Order items event delegation - bir kere set edilir
let _orderEventBound = false;
function bindOrderEvents(){
  if(_orderEventBound) return;
  const body = document.getElementById('orderItems');
  if(!body) return;
  body.addEventListener('click', (e) => {
    e.stopPropagation();
    const btn = e.target.closest('button[data-action]');
    if(!btn) return;
    e.preventDefault();
    const row = btn.closest('.order-row');
    if(!row) return;
    const id = row.getAttribute('data-item-id');
    const action = btn.getAttribute('data-action');
    if(action === 'inc') incQty(id);
    else if(action === 'dec') decQty(id);
  });
  _orderEventBound = true;
}

/* CROSS-SELL */
function getCatType(catCode){
  const cat = categoriesMeta.find(c=>c.code===catCode);
  const label = (cat?.label||catCode).toLowerCase();
  if(/drink|içecek|beverage|juice|boire|trinken|bebida|напиток|مشروب|bevanda|beber|içki/.test(label)) return 'DRINK';
  if(/starter|başlangıç|appetizer|entree|vorspeise|entrée|antipast|soğuk|sıcak başl/.test(label)) return 'STARTER';
  if(/dessert|tatlı|dolce|postre|süss|sweet|pastry|cake/.test(label)) return 'DESSERT';
  return 'MAIN';
}

const CROSS_SELL_RULES = {
  'MAIN':    ['DRINK','STARTER'],
  'STARTER': ['DRINK','MAIN'],
  'DRINK':   [],
  'DESSERT': ['DRINK'],
};

let _crossSellShown = new Set();
let _crossSellTouchStartX = 0;

function triggerCrossSell(addedItem){
  try {
    if(!allItems.length) return;
    
    const alreadyInOrder = new Set(Object.keys(orderList));
    let candidate = null;
    
    // Tip bazlı eşleştirme dene (kategori meta varsa)
    if(categoriesMeta.length){
      const addedCatType = getCatType(addedItem.category||'');
      const targetTypes = CROSS_SELL_RULES[addedCatType] || [];
      
      for(const targetType of targetTypes){
        const targetCatCodes = categoriesMeta.filter(c => getCatType(c.code) === targetType).map(c => c.code);
        const pool = allItems.filter(i =>
          targetCatCodes.includes(i.category||'') &&
          !alreadyInOrder.has(i.id) &&
          !_crossSellShown.has(i.id) &&
          i.id !== addedItem.id
        );
        if(pool.length){candidate = pool[Math.floor(Math.random()*pool.length)];break;}
      }
    }
    
    // Fallback: farklı kategoriden rastgele
    if(!candidate){
      const pool = allItems.filter(i =>
        i.category !== addedItem.category &&
        !alreadyInOrder.has(i.id) &&
        !_crossSellShown.has(i.id) &&
        i.id !== addedItem.id
      );
      if(pool.length) candidate = pool[Math.floor(Math.random()*pool.length)];
    }
    
    // Son fallback: aynı kategoriden bile olsa öner (en az bir öneri çıksın)
    if(!candidate){
      const pool = allItems.filter(i =>
        !alreadyInOrder.has(i.id) &&
        !_crossSellShown.has(i.id) &&
        i.id !== addedItem.id
      );
      if(pool.length) candidate = pool[Math.floor(Math.random()*pool.length)];
    }
    
    if(!candidate){console.log('cross-sell: no candidate'); return;}
    _crossSellShown.add(candidate.id);
    showCrossSellCard(candidate);
  } catch(err) {
    console.error('cross-sell error', err);
  }
}

function showCrossSellCard(item){
  const sym = getSym();

  const thumb = item.photos?.[0]?.url

    : `<div class="cross-sell-thumb" style="display:flex;align-items:center;justify-content:center;font-size:22px">🍽</div>`;
  card.innerHTML = `
    ${thumb}
    <div class="cross-sell-text">
      <div class="cross-sell-label">Goes well with this</div>
      <div class="cross-sell-name">${escapeHtml(item.name)}</div>
      <div class="cross-sell-price">${sym}${item.price}</div>
    </div>
    <button class="cross-sell-add" onclick="event.stopPropagation();addFromCrossSell('${item.id}')">+</button>`;
  card.onclick = (e) => { if(!e.target.closest('.cross-sell-add')) dismissCrossSell(); };
  card.ontouchstart = (e) => { _crossSellTouchStartX = e.touches[0].clientX; e.stopPropagation(); };
  card.ontouchmove = (e) => { e.stopPropagation(); };
  card.ontouchend = (e) => {
    e.stopPropagation();
    const dx = e.changedTouches[0].clientX - _crossSellTouchStartX;
    if(dx > 60) dismissCrossSell();
  };
  // Force reflow + animation
  card.classList.remove('visible');
  void card.offsetWidth;
  setTimeout(() => card.classList.add('visible'), 50);
}

async function fetchMenu(){
  try{
    let url = `${BASE}/api/public/${slug}${branchSlug?'/'+branchSlug:''}`;
    const params = new URLSearchParams();
    if(currentLang) params.set('lang', currentLang);
    if(fromQr) params.set('qr', '1');
    if(params.toString()) url += '?'+params.toString();
    
    const r = await fetch(url);
    const data = await r.json();
    if(!r.ok){
      // Subscription expired
      if(r.status === 402 || data.error === 'menu_unavailable'){
        document.getElementById('splash').innerHTML = `<div class="error-screen">${data.organization?.name||''}<br/>${data.message||'This menu is currently unavailable.'}</div>`;
        return;
      }
      throw new Error(data.error);
    }
    
    orgData = data.organization;
    branchData = data.branch;
    allBranches = data.branches || [];
    categoriesMeta = data.categories || [];
    allItems = data.items;
    availableLanguages = data.availableLanguages || [];
    defaultLanguage = data.defaultLanguage || 'en';
    currentLang = data.currentLanguage || defaultLanguage;
    
    // Kayıtlı dil hâlâ aktif mi kontrol et
    if(!availableLanguages.includes(currentLang)){
      currentLang = defaultLanguage;
    }
    localStorage.setItem('ms_lang_'+slug, currentLang);
    
    document.getElementById('splashName').textContent = orgData.name;
    if(orgData.logoUrl){
      document.getElementById('splashLogo').innerHTML = `<img src="${orgData.logoUrl}" alt=""/>`;
      document.getElementById('profileBtn').innerHTML = `<img src="${orgData.logoUrl}" alt="${orgData.name}"/>`;
    } else {
      document.getElementById('profileFallback').textContent = orgData.name.charAt(0).toUpperCase();
    }
    document.title = orgData.name + ' — Menu';
    
    // Dil butonu (sadece 2+ dil varsa göster)
    if(availableLanguages.length >= 2){
      const btn = document.getElementById('langBtn');
      btn.style.display = 'flex';
      document.getElementById('langBtnLabel').textContent = currentLang.toUpperCase();
    }
    
    if(document.getElementById('splash').style.opacity !== '0'){
      setTimeout(()=>{
        document.getElementById('splash').classList.add('hide');
        init();
      }, 1100);
    } else {
      init();
    }
  }catch(e){
    document.getElementById('splash').innerHTML = `<div class="error-screen">${slug?'Menu not found.':'Invalid link.'}</div>`;
  }
}

function getSym(){return CURRENCIES_SYM[orgData?.currency||'USD']||'$';}
function catMeta(code){
  return categoriesMeta.find(c=>c.code===code) || {code, label:code, color:'#334155'};
}

function getFiltered(){
  let list = allItems;
  if(currentCat !== 'all') list = list.filter(i => (i.category||'MAIN') === currentCat);
  // Dietary filter: OR mantığı
  if(activeDietaryFilters.size > 0){
    list = list.filter(i => activeDietaryFilters.has(i.tagDietary));
  }
  // Allergen filter: seçili alerjenleri içeren item'ları GÖSTERME
  if(activeAllergenFilters.size > 0){
    list = list.filter(i => {
      const itemAllergens = i.allergens || [];
      return !itemAllergens.some(a => activeAllergenFilters.has(a));
    });
  }
  // Kategori sortOrder'a göre sırala (sonra item sortOrder)
  const catOrder = {};
  categoriesMeta.forEach((c, idx) => { catOrder[c.code] = c.sortOrder ?? idx; });
  list = [...list].sort((a, b) => {
    const ao = catOrder[a.category||'MAIN'] ?? 999;
    const bo = catOrder[b.category||'MAIN'] ?? 999;
    if(ao !== bo) return ao - bo;
    return (a.sortOrder||0) - (b.sortOrder||0);
  });
  return list;
}

  // Footer (add/quantity)

function goNextItem(){if(curItem<filteredItems.length-1){curItem++;updateSlidePositions();dismissCrossSell();}}
function goPrevItem(){if(curItem>0){curItem--;updateSlidePositions();dismissCrossSell();}}

function goNextPhoto(){
  const item = filteredItems[curItem]; if(!item) return;
  const photos = item.photos||[];
  const cur = curPhoto[item.id]||0;
  if(cur<photos.length-1){curPhoto[item.id]=cur+1;updatePhotoTrack(item);}
}
function goPrevPhoto(){
  const item = filteredItems[curItem]; if(!item) return;
  const cur = curPhoto[item.id]||0;
  if(cur>0){curPhoto[item.id]=cur-1;updatePhotoTrack(item);}
}
function updatePhotoTrack(item){
  const track = document.getElementById('track-'+item.id); if(!track) return;
  const offset = curPhoto[item.id]||0;
  track.style.transform = `translateX(${-offset*100}%)`;
  const slide = document.getElementById('slide-'+item.id);
  if(!slide) return;
  const dots = slide.querySelectorAll('.pd');
  dots.forEach((d,i)=>d.classList.toggle('on',i===offset));
}

function setupTouch(){
  const el = document.getElementById('screen');
  let touchTarget = null;
  el.addEventListener('touchstart',e=>{
    touchTarget = e.target;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartTime = Date.now();
    trackingAxis = null;
  },{passive:true});
  el.addEventListener('touchmove',e=>{
    if(!trackingAxis){
      const dx = Math.abs(e.touches[0].clientX-touchStartX);
      const dy = Math.abs(e.touches[0].clientY-touchStartY);
      if(dx>8||dy>8) trackingAxis = dx>dy?'h':'v';
    }
  },{passive:true});
  el.addEventListener('touchend',e=>{
    // Buton veya interaktif element'e tıklanıyorsa swipe/tap handler'ı çalıştırma
    const isInteractive = touchTarget && touchTarget.closest('button,a,select,input,.add-btn,.qty-btn,.qty-controls,.read-more-link,.cat,.lang-btn,.filter-btn,.profile-btn');
    if(isInteractive) return;
    
    const dx = touchStartX-e.changedTouches[0].clientX;
    const dy = touchStartY-e.changedTouches[0].clientY;
    const dt = Date.now()-touchStartTime;
    const adx = Math.abs(dx), ady = Math.abs(dy);
    if(dt>500) return;
    if(trackingAxis==='h'&&adx>40){dx>0?goNextPhoto():goPrevPhoto();}
    else if(trackingAxis==='v'&&ady>40){dy>0?goNextItem():goPrevItem();}
    else if(adx<10&&ady<10){if(e.changedTouches[0].clientY>window.innerHeight*0.55) goNextItem();}
  },{passive:true});
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowDown') goNextItem();
    if(e.key==='ArrowUp') goPrevItem();
    if(e.key==='ArrowRight') goNextPhoto();
    if(e.key==='ArrowLeft') goPrevPhoto();
  });
}

  let html = `
    <div class="info-header">
      <div class="info-logo">${o.logoUrl?`<img src="${o.logoUrl}" alt=""/>`:`<svg width="40" height="40" viewBox="0 0 80 80" fill="none"><path d="M16 64 L16 16 L40 48 L64 16 L64 64" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`}</div>
      <div>
        <div class="info-name">${o.name}</div>
        ${b.name && b.name !== o.name?`<div class="info-branch">${b.name}</div>`:''}
      </div>
      ${addr?`<div class="info-address">${addr}</div>`:''}
    </div>`;
  
  html += '<div class="action-btn-row">';
  if(mapsUrl){
    html += `<a href="${mapsUrl}" target="_blank" class="action-btn action-btn-primary">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 18s7-6.4 7-11A7 7 0 003 7c0 4.6 7 11 7 11z" stroke="#fff" stroke-width="1.6" stroke-linejoin="round"/><circle cx="10" cy="7" r="2.5" stroke="#fff" stroke-width="1.6"/></svg>
      Get directions
    </a>`;
  }
  if(reviewUrl){
    html += `<a href="${reviewUrl}" target="_blank" class="action-btn">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 1.5l2.6 5.5 6 .9-4.4 4.2 1 5.9L10 15.2l-5.2 2.8 1-5.9L1.4 7.9l6-.9L10 1.5z" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/></svg>
      Leave a review
    </a>`;
  }
  html += '</div>';
  
  const contacts = [];
  if(phone) contacts.push({icon:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 3h3l1.5 3.5L6 8a8 8 0 003 3l1.5-1.5L14 11v3l-1.5 1.5C7.5 15 1 8.5 1 4l1.5-1L3 3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/></svg>', label:'Phone', value:phone, href:'tel:'+phone});
  if(o.website) contacts.push({icon:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5"/><path d="M1.5 8h13M8 1.5c2 2 2 11 0 13M8 1.5c-2 2-2 11 0 13" stroke="currentColor" stroke-width="1.2"/></svg>', label:'Website', value:o.website, href:o.website});
  if(o.instagram) contacts.push({icon:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="3" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.5"/><circle cx="11.5" cy="4.5" r=".8" fill="currentColor"/></svg>', label:'Instagram', value:'@'+o.instagram.replace('@',''), href:`https://instagram.com/${o.instagram.replace('@','')}`});
  if(o.facebook) contacts.push({icon:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M9 14V8h2l.5-2.5H9V4c0-.7.3-1 1-1h1.5V.5C11.5.5 10.5 0 9.5 0 8 0 7 1 7 3v2.5H5V8h2v6" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>', label:'Facebook', value:o.facebook, href:`https://facebook.com/${o.facebook}`});
  
  if(contacts.length){
    html += '<div class="section-title">Contact</div>';
    contacts.forEach(c=>{
      html += `<a href="${c.href}" target="_blank" class="contact-row"><div class="contact-icon">${c.icon}</div><div class="contact-info"><div class="contact-label">${c.label}</div><div class="contact-value">${c.value}</div></div></a>`;
    });
  }
  
  const hasHours = Object.keys(wh).length>0;
  if(hasHours){
    const days = [['mon','Monday'],['tue','Tuesday'],['wed','Wednesday'],['thu','Thursday'],['fri','Friday'],['sat','Saturday'],['sun','Sunday']];
    html += '<div class="section-title">Working hours</div><div class="hours-list">';
    for(const [code,label] of days){
      const d = wh[code];
      let timeStr = '<span class="hours-time closed">Closed</span>';
      if(d && d.open && d.close) timeStr = `<span class="hours-time">${d.open} – ${d.close}</span>`;
      html += `<div class="hours-row"><span class="hours-day ${code===today?'today':''}">${label}</span>${timeStr}</div>`;
    }
    html += '</div>';
  }
  
  if(allBranches.length>1){
    html += '<div class="section-title">Other locations</div><div class="branch-switch-list">';
    for(const br of allBranches){
      const isCurrent = br.id===b.id;
      const url = `${BASE}/menu/${slug}/${br.slug}`;
      html += `<a href="${isCurrent?'#':url}" class="branch-switch-item ${isCurrent?'current':''}" ${isCurrent?'onclick="event.preventDefault();closeInfo();"':''}>
        <div class="contact-icon" style="background:${isCurrent?'rgba(255,255,255,.2)':'rgba(255,255,255,.08)'}">📍</div>
        <div class="contact-info">
          <div class="contact-value">${br.name}</div>
          <div class="contact-label">${br.city||''}${isCurrent?' · Current':''}</div>
        </div>
      </a>`;
    }
    html += '</div>';
  }
  
  document.getElementById('infoContent').innerHTML = html;
}

boot();
</script>
</body>
</html>
